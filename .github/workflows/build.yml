name: build
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14
    - name: Install flake8
      run: pip install flake8 flake8-import-order flake8-commas
    - name: Lint with flake8
      run: |
        flake8 --version
        flake8
  unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14
    - name: Install test dependencies
      run: |
        pip install wheel
        pip install -r requirements.txt
    - name: Run unit tests
      run: python -m unittest
  integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14
    - name: Install test dependencies
      run: |
        pip install wheel
        pip install -r requirements.txt
    - name: Run integration tests
      run: python .test.py
